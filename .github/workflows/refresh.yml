name: "refresh"

on:
  workflow_run:
    workflows: ["pages-build-deployment"]
    types: 
      - completed

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies & fix folder permission
        run: |
          sudo apt update 2>/dev/null 1>/dev/null
          sudo apt install dpkg-dev bzip2 xz-utils zstd -y
          sudo chmod 777 ./debs -R

      - name: Scan deb packages (skip broken files automatically)
        run: |
          rm -rf ./Packages*
          dpkg-scanpackages -m ./debs /dev/null 2>/dev/null > ./Packages || true
          bzip2 -v -k -9 Packages || true
          xz -v -k -9 --extreme Packages || true
          zstd --ultra -22 -k Packages -o Packages.zst || true

      - name: Commit and push updated index
        run: |
          git config --global user.email 'action@github.com'
          git config --global user.name 'GitHub Action'
          git add .
          if ! git diff --staged --exit-code 1>/dev/null; then
            git commit -m 'Auto refresh repo index'
            git push
          fi
          
      - name: Download auto clean tool
        run: |
          sudo curl --connect-timeout 10 -L -o '/usr/bin/remove_all_actions' 'https://raw.githubusercontent.com/invalidunit/action/main/remove_all_actions' || true
          sudo chmod 0755 '/usr/bin/remove_all_actions' || true

      - name: Clean old failed workflows
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          remove_all_actions || true
